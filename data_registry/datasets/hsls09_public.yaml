tier2_config:
  enabled: true
  auto_generated_file: hsls09_tier2_auto_v2.yaml
  usage_policy: Tier 2 variables are available after Tier 3 exclusions and require explicit educational rationale, temporal
    checks, and fairness-risk review before model inclusion.
missingness:
  mechanism_assumption: mixed_MAR_MNAR
  sentinel_codes_or_labels:
  - '-9'
  - '-8'
  - '-7'
  - '-6'
  - '-5'
  - '-1'
  - Missing
  - Unit non-response
  - "Don't know"
  - Data suppressed
  - Component not applicable
  - Item legitimate skip/NA
  recommended_method: multiple_imputation_or_indicator_plus_sensitivity
  mnar_candidates:
  - dropout_derived
  - X4EVRATNDCLG
  - X4RFDGMJ14Y
  - X5STEMCRED
  note: This public-use extract mixes numeric sentinels and labeled missing categories; workflows must standardize missing
    parsing before modeling.
common_pitfalls:
- id: temporal_leakage
  description: Using later-wave predictors to model earlier-wave outcomes.
  check: Ensure predictor wave precedes outcome wave in temporal_order.
  severity: critical
- id: same_wave_target_leakage
  description: Using near-duplicate transcript/composite variables from same wave as target.
  check: Review same-wave high-correlation predictors and remove proxy targets.
  severity: critical
- id: public_use_suppression
  description: Treating 'Data suppressed' labels as substantive signal.
  check: Map suppression labels to missing before analysis.
  severity: major
- id: school_level_misinterpretation
  description: Assuming school IDs are available for multilevel random effects in this extract.
  check: Document suppression and clustering limitations in methods.
  severity: major
- id: protected_attribute_misuse
  description: Using protected attributes without fairness diagnostics.
  check: If protected predictors are used, require subgroup and disparity reporting.
  severity: major
canonical_research_questions:
  prediction:
  - Predict first follow-up math achievement (X2TXMTSCOR) from base-year covariates.
  - Predict transcript-based academic GPA (X3TGPAACAD) from early attitudes, SES, and course signals.
  - Predict high school completion risk (dropout_derived) from baseline and follow-up indicators.
  - Predict postsecondary attendance (X4EVRATNDCLG) from transcript and expectation variables.
  - Predict STEM major orientation outcomes (X4RFDGMJSTEM, X5STEMCRED) from longitudinal math/science pathways.
  fairness:
  - Evaluate race and gender subgroup performance disparities in achievement and attainment prediction.
  - Assess SES-gradient error differences for postsecondary enrollment and STEM outcomes.
  - Run intersectional checks (race x sex x SES quintile) for calibration and error parity.
  policy:
  - Estimate associations between school climate/counseling context and postsecondary pathways.
  - Model transcript math/science progression as mediators of STEM-related outcomes.
