name: hsls09_public
full_name: High School Longitudinal Study of 2009 - Public-Use File (labeled CSV extract)
source: NCES
documentation_url: https://nces.ed.gov/surveys/hsls09/
access: public
data_structure: multilevel
levels:
  student: 23503
  school: 944
multilevel_note: Public-use IDs for school linkage fields are suppressed in this extract (e.g., SCH_ID, X1NCESID, X2NCESID).
  School-context variables are replicated at the student row level. Multilevel modeling and design-based variance estimation
  require restricted-use identifiers or external design information.
waves:
  base_year:
    year: 2009
    grade: 9
    prefix: X1/S1/P1/A1/C1/M1/N1/W1
    label: 9th grade
  first_follow_up:
    year: 2012
    grade: 11
    prefix: X2/S2/P2/A2/C2/M2/N2/W2
    label: 11th grade
  second_follow_up:
    year: 2013
    grade: 12
    prefix: X3/S3/P3/A3/C3/M3/N3/W3
    label: 12th grade/update
  update_panel:
    year: 2016
    grade: null
    prefix: X4/S4/P4/A4/C4/M4/N4/W4
    label: second follow-up panel
  postsecondary_records:
    year: 2017
    grade: null
    prefix: X5/S5/P5/A5/C5/M5/N5/W5
    label: postsecondary records/financial aid follow-up
temporal_order:
- base_year
- first_follow_up
- second_follow_up
- update_panel
- postsecondary_records
sampling: Two-stage stratified design; this public-use CSV includes labeled values and many suppressed design identifiers.
  Analyses should document weighting/cluster limitations explicitly.
prefix_wave_mapping_note: Wave inference is prefix-based across X/S/P/A/C/M/N families; W* variables are weights and excluded
  by Tier 3 rules.
tier3_exclusion_rules:
  prefix_patterns:
  - ^W[0-9]
  - ^BRR
  suffix_patterns:
  - _IM$
  - _FLG$
  - FLAG$
  - _I$
  exact_matches:
  - STU_ID
  - SCH_ID
  - STRAT_ID
  - PSU
  - psu
  - X1NCESID
  - X2NCESID
  - X1SQSTAT
  - X1PQSTAT
  - X1TMQSTAT
  - X1TSQSTAT
  - X1AQSTAT
  - X1CQSTAT
  - X2SQSTAT
  - X2PQSTAT
  - X2AQSTAT
  - X2CQSTAT
  - X3SQSTAT
  - X4SQSTAT
  category_labels:
  - administrative
  - sampling
  - weight
  - imputation_flag
  - processing_flag
  - interviewer_variable
  - logical_inference_flag
tier: 1
variables:
  outcomes:
